name: Cache Demo Workflow

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: cache-4ff83c8

      - name: prime-cache-4ff83c8
        run: |
          echo "Cache hit? -> ${{ steps.cache-step.outputs.cache-hit }}"
